name = "mac-do-ai-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2026-06-01"

# ─── KV namespace cho rate limit (OPTIONAL — uncomment sau khi tạo) ───
#
# Bước 1: wrangler kv namespace create RATELIMIT
# Bước 2: Copy id từ output, paste vào dưới, rồi uncomment block:
#
[[kv_namespaces]]
binding = "RATELIMIT"
id = "ea1b26951d6942da80a3810cd99d265a"
#
# Khi KV chưa setup → worker fail-open (cho qua, không rate limit).
# Khi KV setup → rate limit 50 req/giờ/IP enforce.

# ─── Env vars cấu hình ở dashboard sau ───
# Secrets (qua: wrangler secret put NAME):
#   GEMINI_API_KEY_1       — bắt buộc ít nhất 1 key
#   GEMINI_API_KEY_2       — optional, rotation
#   GEMINI_API_KEY_3       — optional, rotation
# Plain vars:
#   GEMINI_MODEL           — optional, default "gemini-2.5-flash"

[vars]
# Có thể set ở đây hoặc qua dashboard
# GEMINI_MODEL = "gemini-2.5-flash"

# ─── Workers AI binding (Phase 8.2 — free 10K req/day image gen) ───
[ai]
binding = "AI"

# ─── Observability ───
[observability]
enabled = true
