# Mặc Hội Tiên Đồ — nginx site config
# Đặt vào: /etc/nginx/sites-available/mac-do
# Activate: ln -sf /etc/nginx/sites-available/mac-do /etc/nginx/sites-enabled/
# Reload:   nginx -t && nginx -s reload

# ──────────────────────────────────────────────────────────────
# HTTP (port 80) — sau khi có HTTPS sẽ redirect 301 sang HTTPS
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 91.108.104.135;   # đổi sang domain thật khi có

    root /var/www/mac-do/current;
    index index.html;

    access_log /var/log/nginx/mac-do.access.log;
    error_log  /var/log/nginx/mac-do.error.log;

    # ─── Compression ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/wasm
        image/svg+xml application/xml;

    # ─── SPA fallback — tất cả route không match file → index.html ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache assets có hash (immutable forever) ───
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Cache static (svg, json, manifest, fonts) 7 ngày ───
    location ~* \.(svg|json|webmanifest|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── HTML không cache (vì có hash trong assets) ───
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # ─── Service worker — bắt buộc no-cache để update được ───
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ─── PWA manifest ───
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Block dotfiles ───
    location ~ /\.(ht|env|git) {
        deny all;
        return 404;
    }

    # ─── Limit upload size (game không upload nhiều) ───
    client_max_body_size 1m;
}

