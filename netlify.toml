# Netlify config cho Mặc Hội Tiên Đồ
# Auto-detect bởi Netlify khi push repo lên GitHub.
# Hoặc deploy thủ công: `netlify deploy --prod`

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Pin node version (tránh deploy fail vì version khác local)
  NODE_VERSION = "22"
  NPM_FLAGS = "--prefer-offline --no-audit"

# ──────────────────────────────────────────────────────────────
# Deploy contexts
# ──────────────────────────────────────────────────────────────
[context.production]
  command = "npm run typecheck && npm run test && npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# ──────────────────────────────────────────────────────────────
# SPA fallback — route nào không match file → index.html
# (cũng có thể dùng _redirects nhưng inline đây cleaner)
# ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ──────────────────────────────────────────────────────────────
# Cache headers
# ──────────────────────────────────────────────────────────────
# Assets có content hash → cache immutable 1 năm
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Lottie JSON + SVG icons
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Service worker — KHÔNG cache (để update được)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# HTML không cache aggressive
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ──────────────────────────────────────────────────────────────
# Security headers (global)
# ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP: allow Gemini + DeepSeek + Imagen + Firebase + Google Fonts + Cloudflare Worker proxy
    # connect-src cần fonts.gstatic.com vì service worker intercept fetch font
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob: https://image.pollinations.ai; connect-src 'self' https://generativelanguage.googleapis.com https://*.googleapis.com https://api.deepseek.com https://image.pollinations.ai https://*.firebaseio.com wss://*.firebaseio.com https://firebasestorage.googleapis.com https://*.workers.dev https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self'; manifest-src 'self'"
